{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ro'yxatdan o'tish — GreatKart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 480px;
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .logo-text { font-size: 26px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; }
    .auth-logo .logo-text span { color: #2563eb; }
    .auth-logo p { font-size: 14px; color: #64748b; margin-top: 6px; }

    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }

    /* Override Django form field styles */
    .auth-card input[type="text"],
    .auth-card input[type="email"],
    .auth-card input[type="password"] {
      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      transition: all 0.2s;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .auth-card input:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    /* p tag wrapping from {{ form.as_p }} */
    .auth-card form > p { margin-bottom: 16px; }
    .auth-card form > p label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      display: block;
      margin-bottom: 6px;
    }
    .auth-card form > p ul {
      list-style: none;
      padding: 0;
      margin-top: 6px;
    }
    .auth-card form > p ul li {
      font-size: 12px;
      color: #dc2626;
      padding: 2px 0;
    }
    .auth-card form > p ul li::before { content: "⚠ "; }

    .help-text {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 5px;
    }

    .btn-auth {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-auth:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37,99,235,0.3);
    }
    .auth-footer { text-align: center; margin-top: 22px; font-size: 14px; color: #64748b; }
    .auth-footer a { color: #2563eb; font-weight: 500; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }

    .back-top { position: fixed; top: 20px; left: 20px; }
    .back-top a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      text-decoration: none;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 7px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .back-top a:hover { background: rgba(255,255,255,0.2); color: #fff; }

    .errorlist { color: #dc2626; font-size: 12px; margin-top: 4px; padding-left: 14px; }
  </style>
</head>
<body>

  <div class="back-top">
    <a href="{% url 'home' %}">
      <i class="fa fa-arrow-left"></i> Bosh sahifa
    </a>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">Great<span>Kart</span></div>
      <p>Yangi hisob yarating</p>
    </div>

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-auth">
        <i class="fa fa-user-plus me-2"></i>Ro'yxatdan o'tish
      </button>
    </form>

    <div class="auth-footer">
      Allaqachon hisobingiz bormi? <a href="{% url 'login' %}">Kirish</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
