{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish — GreatKart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 60%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-card {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .auth-logo .logo-text {
      font-size: 26px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.5px;
    }
    .auth-logo .logo-text span { color: #2563eb; }
    .auth-logo p {
      font-size: 14px;
      color: #64748b;
      margin-top: 6px;
    }
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-control {
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      color: #0f172a;
      transition: all 0.2s;
      background: #f8fafc;
    }
    .form-control:focus {
      border-color: #2563eb;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      outline: none;
    }
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .form-control { padding-left: 42px; }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 15px;
      pointer-events: none;
    }
    .btn-auth {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }
    .btn-auth:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(37,99,235,0.3);
    }
    .auth-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: #64748b;
    }
    .auth-footer a { color: #2563eb; font-weight: 500; text-decoration: none; }
    .auth-footer a:hover { text-decoration: underline; }
    .alert-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      color: #dc2626;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #cbd5e1;
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .back-top {
      position: fixed;
      top: 20px;
      left: 20px;
    }
    .back-top a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      text-decoration: none;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 7px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .back-top a:hover { background: rgba(255,255,255,0.2); color: #fff; }
  </style>
</head>
<body>

  <!-- Back to home -->
  <div class="back-top">
    <a href="{% url 'home' %}">
      <i class="fa fa-arrow-left"></i> Bosh sahifa
    </a>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-text">Great<span>Kart</span></div>
      <p>Hisobingizga kiring</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert-msg">
      <i class="fa fa-exclamation-circle"></i> {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label">Foydalanuvchi nomi</label>
        <div class="input-icon-wrap">
          <i class="fa fa-user input-icon"></i>
          {{ form.username }}
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Parol</label>
        <div class="input-icon-wrap">
          <i class="fa fa-lock input-icon"></i>
          {{ form.password }}
        </div>
      </div>
      <button type="submit" class="btn-auth">
        <i class="fa fa-sign-in-alt me-2"></i>Kirish
      </button>
    </form>

    <div class="auth-footer">
      Hisob yo'qmi? <a href="{% url 'signup' %}">Ro'yxatdan o'ting</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Add placeholder and class to Django form fields
    document.addEventListener('DOMContentLoaded', function() {
      const usernameInput = document.querySelector('input[name="username"]');
      const passwordInput = document.querySelector('input[name="password"]');
      if (usernameInput) {
        usernameInput.classList.add('form-control');
        usernameInput.placeholder = 'username kiriting';
      }
      if (passwordInput) {
        passwordInput.classList.add('form-control');
        passwordInput.placeholder = 'Parolingizni kiriting';
      }
    });
  </script>
</body>
</html>
