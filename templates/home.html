{% extends "base.html" %} {% load static %} {% block content %}
<!-- ========================= SECTION MAIN ========================= -->
<section class="section-intro padding-y-sm">
  <div class="container">
    <div class="intro-banner-wrap">
      <img src="{% static 'images/banners/1.jpg' %}" class="img-fluid rounded" />
    </div>
  </div>
</section>

<!-- ========================= SECTION  ========================= -->
<section class="section-name padding-y-sm">
  <div class="container">
    <header class="section-heading">
      <a href="{% url 'store' %}" class="btn btn-outline-primary float-right">See all</a>
      <h3 class="section-title">Popular products</h3>
    </header>

    <div class="row">
      {% for product in products %}
      <div class="col-md-3">
        <div class="card card-product-grid">
          <a href="{{product.get_url}}" class="img-wrap">
            <img src="{{product.image.url}}" />
          </a>
          <figcaption class="info-wrap">
            <a href="{{product.get_url}}" class="title">{{product.name}}</a>
            <div class="price mt-1">${{product.price}}</div>

            <!-- Kim qo'shgani -->
            {% if product.owner %}
            <div class="text-muted small mt-1">
              <i class="fa fa-user"></i> {{ product.owner.username }}
            </div>
            {% endif %}

            <!-- Like soni -->
            <div class="mt-1">
              <span class="text-danger small">
                <i class="fa fa-heart"></i> {{ product.likes.count }} like
              </span>
            </div>

          </figcaption>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

{% endblock %}
