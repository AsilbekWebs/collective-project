{% load static %}

<header class="section-header">

<nav class="navbar p-md-0 navbar-expand-sm navbar-light border-bottom">
    <div class="container">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarTop4">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarTop4">

            <ul class="navbar-nav mr-auto">
                <li class="nav-item">
                    <a href="#" class="nav-link">English</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">USD</a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li>
                    <a href="#" class="nav-link">
                        <i class="fa fa-envelope"></i> Email
                    </a>
                </li>

                <li>
                    <a href="#" class="nav-link">
                        <i class="fa fa-phone"></i> Call us
                    </a>
                </li>
            </ul>

        </div>
    </div>
</nav>

<section class="header-main border-bottom">
    <div class="container">

        <div class="row align-items-center">

            <!-- Logo -->
            <div class="col-lg-2 col-md-3 col-6">
                <a href="{% url 'home' %}" class="brand-wrap">
                    <img class="logo" src="{% static 'images/logo.png' %}">
                </a>
            </div>

            <!-- Category -->
            <div class="col-lg col-sm col-md col-6 flex-grow-0">

                <div class="category-wrap dropdown d-inline-block float-right">

                    <button class="btn btn-primary dropdown-toggle" data-toggle="dropdown">
                        <i class="fa fa-bars"></i> All Category
                    </button>

                    <div class="dropdown-menu">

                        {% for category in categories %}
                            <a class="dropdown-item" href="{{ category.get_url }}">
                                {{ category.name }}
                            </a>
                        {% endfor %}

                    </div>

                </div>

            </div>

            <!-- Store Button -->
            <a href="{% url 'store' %}" class="btn btn-outline-primary">
                Store
            </a>

            <!-- Search -->
            <div class="col-lg col-md-6 col-sm-12 col">

                <form action="{% url 'store' %}" method="GET" class="search">

                    <div class="input-group w-100">

                        <input
                            type="text"
                            name="keyword"
                            class="form-control"
                            placeholder="Search products">

                        <div class="input-group-append">

                            <button class="btn btn-primary" type="submit">
                                <i class="fa fa-search"></i>
                            </button>

                        </div>

                    </div>

                </form>

            </div>

            <!-- User -->
            <div class="col-lg-3 col-sm-6 col-8 order-2 order-lg-3">

                <div class="d-flex justify-content-end mb-3 mb-lg-0">

                    <div class="widget-header">

                        {% if user.is_authenticated %}

                            <small class="title text-muted">
                                Welcome {{ user.username }}
                            </small>

                            <div>
                                <a href="{% url 'logout' %}">
                                    Logout
                                </a>
                            </div>

                        {% else %}

                            <small class="title text-muted">
                                Welcome Guest!
                            </small>

                            <div>
                                <a href="{% url 'login' %}">
                                    Sign in
                                </a>

                                <span class="dark-transp"> | </span>

                                <a href="{% url 'signup' %}">
                                    Register
                                </a>
                            </div>

                        {% endif %}

                    </div>

                    <!-- Cart -->

                    <a href="#" class="widget-header pl-3 ml-3">

                        <div class="icon icon-sm rounded-circle border">
                            <i class="fa fa-shopping-cart"></i>
                        </div>

                        <span class="badge badge-pill badge-danger notify">
                            0
                        </span>

                    </a>

                </div>

            </div>

        </div>

    </div>
</section>

</header>
