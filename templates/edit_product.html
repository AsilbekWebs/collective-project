{% extends "base.html" %} {% load static %} {% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card p-4" style="border-radius: 20px; border: none; box-shadow: 0 4px 24px rgba(0,0,0,0.06);">
                <h3 class="fw-bold mb-4">Mahsulotni tahrirlash</h3>
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Saqlash</button>
                    <a href="{% url 'profile' %}" class="btn btn-outline-secondary w-100 mt-2">Bekor qilish</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
